<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya — NurseMate</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a3d4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maya">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0d4f5c;--teal-light:#0f8fa0;--teal-mid:#13919f;
  --green:#34d399;--red:#f87171;--amber:#fcd34d;
  --bg:#0f1f35;--bg2:#0a111f;--bg3:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.14);--border2:rgba(255,255,255,0.2);
  --text:#e0f2f1;--text2:#94a3b8;--text3:#7de8f0;
  --radius:14px;--shadow:0 4px 20px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg2);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}

/* HEADER */
.header{background:linear-gradient(135deg,#0a3d4a,var(--teal-light));padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.logo{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;flex:1;}
.logo span{color:#7de8f0;font-style:italic;}
.back-btn{display:none;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:6px 14px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;}
.back-btn.visible{display:flex;align-items:center;gap:5px;}
.lang-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 11px;border-radius:16px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.lang-btn:hover{background:rgba(255,255,255,0.22);}

/* DISCLAIMER */
.disc{background:rgba(252,211,77,0.1);border-bottom:1px solid rgba(252,211,77,0.25);padding:8px 18px;font-size:0.76rem;color:var(--amber);text-align:center;font-weight:500;}

/* PAGES */
.page{display:none;background:var(--bg2);min-height:calc(100vh - 60px);animation:fadeUp 0.25s ease;}
.page.active{display:block;}

/* DASHBOARD */
.hero{background:linear-gradient(135deg,#0a3d4a,var(--teal-light));padding:20px 20px 18px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;background:rgba(255,255,255,0.05);border-radius:50%;}
.hero-title{font-family:'DM Serif Display',serif;font-size:1.75rem;color:#fff;line-height:1.2;margin-bottom:5px;}
.hero-title span{color:#7de8f0;font-style:italic;}
.hero-sub{font-size:0.83rem;color:rgba(255,255,255,0.78);}

.qn-btn{display:flex;align-items:center;gap:14px;margin:18px 16px 14px;padding:18px 20px;background:linear-gradient(135deg,#0a3d4a,var(--teal-light));border:none;border-radius:16px;color:#fff;font-family:'DM Serif Display',serif;font-size:1.05rem;cursor:pointer;box-shadow:0 6px 22px rgba(13,110,122,0.4);width:calc(100% - 32px);transition:all 0.2s;}
.qn-btn:hover{opacity:0.92;transform:translateY(-2px);}
.qn-sub{font-family:'DM Sans',sans-serif;font-size:0.76rem;opacity:0.82;margin-top:2px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:0 16px 80px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px 14px 16px;text-align:center;cursor:pointer;transition:all 0.22s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal-light));opacity:0;transition:opacity 0.2s;}
.card:hover{border-color:var(--teal-light);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.card:hover::before{opacity:1;}
.card .ico{font-size:2.2rem;display:block;margin-bottom:8px;}
.card .cn{font-family:'DM Serif Display',serif;font-size:0.95rem;color:var(--text3);margin-bottom:3px;}
.card .cd{font-size:0.72rem;color:var(--text2);line-height:1.4;}

/* MODULE PAGES */
.mod-page{padding:20px 16px 80px;max-width:640px;margin:0 auto;}
.mod-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text3);margin-bottom:4px;}
.mod-desc{font-size:0.83rem;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.priv{background:rgba(252,211,77,0.1);border:1px solid rgba(252,211,77,0.3);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:var(--amber);margin-bottom:18px;font-weight:500;line-height:1.6;}

.blk{margin-bottom:18px;}
.lbl{font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;display:block;}

.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:8px 15px;border-radius:22px;border:1px solid var(--border2);background:rgba(255,255,255,0.07);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--teal-light);color:var(--text3);}
.chip.sel{background:linear-gradient(135deg,var(--teal),var(--teal-light));border-color:var(--teal-light);color:#fff;box-shadow:0 2px 10px rgba(13,110,122,0.4);}

input.f,textarea.f,select.f{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:10px;background:rgba(255,255,255,0.07);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
input.f::placeholder,textarea.f::placeholder{color:rgba(148,163,184,0.5);}
input.f:focus,textarea.f:focus{border-color:var(--teal-light);}
textarea.f{min-height:70px;resize:vertical;line-height:1.6;}
select.f{cursor:pointer;}
select.f option{background:#1e2937;}

.gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0a3d4a,var(--teal-light));color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:10px;transition:all 0.2s;box-shadow:0 4px 16px rgba(13,110,122,0.3);}
.gen-btn:hover{opacity:0.92;transform:translateY(-2px);}
.gen-btn:disabled{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);cursor:not-allowed;transform:none;box-shadow:none;}

.loader{display:none;align-items:center;justify-content:center;gap:10px;padding:14px;color:var(--text3);font-size:0.86rem;font-weight:600;}
.loader.vis{display:flex;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(13,145,159,0.25);border-top-color:var(--teal-light);border-radius:50%;animation:spin 0.8s linear infinite;}

.err{display:none;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:11px 14px;font-size:0.83rem;color:var(--red);margin-top:10px;}
.err.vis{display:block;}

.res-lbl{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text3);margin-bottom:8px;}
.res-box{width:100%;min-height:130px;padding:16px 18px;border:1px solid rgba(13,145,159,0.35);border-left:4px solid var(--teal-light);border-radius:var(--radius);background:rgba(255,255,255,0.06);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.93rem;line-height:1.75;white-space:pre-wrap;resize:vertical;margin-bottom:12px;}
.res-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.res-btn{padding:11px;border-radius:10px;border:1px solid var(--border2);background:rgba(255,255,255,0.07);font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.2s;text-align:center;}
.res-btn:hover{border-color:var(--teal-light);color:var(--text3);}
.res-btn.pri{background:linear-gradient(135deg,#0a3d4a,var(--teal-light));border:none;color:#fff;}

.voice-btn{background:rgba(13,145,159,0.18);border:1px solid rgba(13,145,159,0.35);color:var(--text3);width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;margin-left:8px;flex-shrink:0;transition:all 0.2s;}
.voice-btn.rec{background:rgba(239,68,68,0.2);border-color:#ef4444;color:#f87171;animation:pulse 1s infinite;}
.voice-row{display:flex;align-items:flex-start;}
.voice-row textarea.f{flex:1;}

.scenario{display:none;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;border:1px solid var(--border);margin-top:4px;}
.scenario.act{display:block;}

/* POPUP */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.popup{background:#1a2840;border:1px solid var(--border2);border-radius:18px;padding:26px 22px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.6);text-align:center;}
.popup h2{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--text3);margin-bottom:10px;}
.popup p{font-size:0.84rem;color:var(--text2);line-height:1.65;margin-bottom:14px;}
.popup-rules{background:rgba(252,211,77,0.1);border:1px solid rgba(252,211,77,0.28);border-radius:10px;padding:12px 14px;text-align:left;font-size:0.79rem;color:var(--amber);margin-bottom:20px;line-height:1.75;font-weight:500;}
.popup-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0a3d4a,var(--teal-light));color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.93rem;font-weight:700;cursor:pointer;}

/* SUPPORT CHAT */
#support-chat{min-height:180px;margin-bottom:14px;display:flex;flex-direction:column;gap:10px;}
.chat-msg{display:flex;max-width:85%;animation:fadeUp 0.3s ease;}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse;}
.chat-bubble{padding:10px 14px;border-radius:18px;font-size:0.88rem;line-height:1.65;font-family:'DM Sans',sans-serif;}
.chat-msg.maya .chat-bubble{background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:18px 18px 18px 4px;color:var(--text);}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,#0a3d4a,var(--teal-light));color:#fff;border-radius:18px 18px 4px 18px;}

/* LEARN */
.tip-box{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.28);border-radius:14px;padding:15px;margin-bottom:14px;}
.quiz-box{background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.25);border-radius:14px;padding:15px;}
.quiz-opt{padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.86rem;text-align:left;cursor:pointer;transition:all 0.2s;width:100%;margin-bottom:7px;display:block;}
.quiz-opt:last-child{margin-bottom:0;}
.quiz-opt.correct{border-color:var(--green);background:rgba(52,211,153,0.15);color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(248,113,113,0.15);color:var(--red);}

@media(max-width:600px){.grid{grid-template-columns:1fr;}.res-actions{grid-template-columns:1fr;}.chip{padding:7px 12px;font-size:0.78rem;}.mod-page{padding:16px 12px 70px;}.blk{margin-bottom:15px;}.lbl{font-size:0.68rem;}}
</style>
</head>
<body>

<!-- POPUP -->
<div class="overlay" id="popup">
  <div class="popup" style="max-width:340px;">
    <div style="font-size:2.8rem;margin-bottom:10px;">🩺</div>
    <h2 id="popup-title" style="font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text3);margin-bottom:8px;">Maya NurseMate</h2>
    <p id="popup-sub" style="font-size:0.88rem;color:var(--text2);line-height:1.6;margin-bottom:16px;"></p>
    <div style="background:rgba(252,211,77,0.1);border:1px solid rgba(252,211,77,0.25);border-radius:10px;padding:11px 14px;font-size:0.8rem;color:var(--amber);margin-bottom:18px;line-height:1.65;">
      🔒 <span id="popup-rule"></span>
    </div>
    <button class="popup-btn" id="popup-btn" onclick="closePopup()" style="font-size:1rem;padding:15px;"></button>
  </div>
</div>

<!-- QUICK NOTE MODAL -->
<div class="overlay" id="qn-modal" style="display:none;">
  <div class="popup" style="text-align:left;">
    <h2 id="qn-title" style="text-align:center;margin-bottom:14px;"></h2>
    <div class="priv" id="qn-priv"></div>
    <span class="lbl" id="qn-room-lbl"></span>
    <input type="text" class="f" id="qn-kamer" style="margin-bottom:12px;">
    <span class="lbl" id="qn-note-lbl"></span>
    <div class="voice-row">
      <textarea class="f" id="qn-text" style="min-height:80px;flex:1;"></textarea>
      <button class="voice-btn" onclick="toggleVoice(this,'qn-text')">🎤</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;">
      <button class="res-btn" onclick="closeQnModal()" id="qn-cancel"></button>
      <button class="res-btn pri" onclick="submitQn()" id="qn-submit"></button>
    </div>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="overlay" id="res-modal" style="display:none;">
  <div class="popup" style="text-align:left;max-width:480px;">
    <div class="res-lbl" id="res-modal-title"></div>
    <textarea class="res-box" id="res-modal-text"></textarea>
    <div class="res-actions">
      <button class="res-btn" onclick="copyRes()" id="res-copy-btn"></button>
      <button class="res-btn pri" onclick="document.getElementById('res-modal').style.display='none'" id="res-done-btn"></button>
    </div>
    <div style="font-size:0.73rem;color:var(--text2);margin-top:10px;text-align:center;" id="res-disclaimer"></div>
  </div>
</div>

<!-- GESCHIEDENIS MODAL -->
<div class="overlay" id="hist-modal" style="display:none;">
  <div class="popup" style="text-align:left;max-width:480px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text3);" id="hist-title">Recent reports</div>
      <button onclick="document.getElementById('hist-modal').style.display='none'" style="background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <div id="hist-list" style="display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;"></div>
    <button onclick="document.getElementById('hist-modal').style.display='none'" class="gen-btn" id="hist-close-btn" style="margin-top:14px;"></button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" id="back-btn" onclick="goBack()">← <span id="back-lbl">Back</span></button>
  <div class="logo" style="flex:1;">Maya <span>NurseMate</span></div>
  <button onclick="sendFeedback()" title="Feedback" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 11px;border-radius:16px;font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;">💬</button>
  <button onclick="openHistory()" id="hist-btn" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 11px;border-radius:16px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;">📋</button>
  <button class="lang-btn" onclick="cycleLang()">🌐 <span id="lang-display">EN</span></button>
</div>
<div class="disc" id="disc-bar"></div>
<div id="install-banner" style="display:none;background:linear-gradient(135deg,#0a3d4a,#0f8fa0);padding:10px 18px;align-items:center;justify-content:space-between;gap:10px;">
  <div style="font-size:0.8rem;color:rgba(255,255,255,0.9);font-family:'DM Sans',sans-serif;">📱 <span id="install-txt">Install Maya on your phone</span></div>
  <div style="display:flex;gap:8px;">
    <button onclick="installApp()" id="install-btn" style="padding:6px 14px;border-radius:20px;border:none;background:white;color:#0a3d4a;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;"></button>
    <button onclick="document.getElementById('install-banner').style.display='none'" style="padding:6px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer;">✕</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-title" id="hero-title">Your AI <span>colleague.</span></div>
    <div class="hero-sub" id="hero-sub">Professional nursing documentation in 30 seconds</div>
    <div id="time-saved-bar" style="display:none;margin-top:14px;background:rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:1.3rem;">⏱️</span>
      <div>
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.7);font-weight:500;" id="time-saved-label"></div>
        <div style="font-size:1.1rem;color:#fff;font-weight:700;" id="time-saved-value"></div>
      </div>
    </div>
  </div>
  <button class="qn-btn" onclick="openQnModal()">
    <span style="font-size:1.6rem;">🎤</span>
    <div><div id="qn-btn-title">Quick Note</div><div class="qn-sub" id="qn-btn-sub">Speak or type — AI writes the report</div></div>
  </button>
  <div class="grid" id="module-grid"></div>
</div>

<!-- SHIFT BRIEFING -->
<div id="page-shift" class="page">
  <div class="mod-page">
    <div class="mod-title" id="shift-title">📋 Shift Briefing</div>
    <div class="mod-desc" id="shift-desc"></div>
    <div class="priv" id="shift-priv"></div>

    <!-- PATIENT LIST -->
    <div id="sh-patient-list" style="display:none;margin-bottom:16px;">
      <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;" id="sh-list-lbl"></div>
      <div id="sh-patient-cards"></div>
    </div>

    <!-- SHIFT RUSTIG KNOP -->
    <button id="sh-quiet-btn" onclick="generateQuietShift()" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);color:#34d399;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;"></button>

    <div style="background:rgba(13,145,159,0.08);border:1px solid rgba(13,145,159,0.2);border-radius:12px;padding:14px;margin-bottom:16px;">
      <div style="font-size:0.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;" id="sh-add-lbl"></div>
      <div class="blk" style="margin-bottom:12px;"><span class="lbl" id="shift-room-lbl"></span><input type="text" class="f" id="sh-kamer" oninput="refreshBtns()"></div>
    <div class="blk">
      <span class="lbl" id="shift-status-lbl"></span>
      <div class="chips" id="sh-status-chips"></div>
    </div>
    <div class="blk">
      <span class="lbl" id="shift-obs-lbl"></span>
      <div class="chips" id="sh-obs-chips"></div>
      <div id="sh-pain-wrap" style="display:none;margin-top:8px;"><input type="text" class="f" id="sh-pain-loc"></div>
      <div id="sh-params-wrap" style="display:none;margin-top:8px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">
          <input class="f" id="sh-rr" placeholder="BP e.g. 120/70" style="padding:8px 10px;font-size:0.82rem;">
          <input class="f" id="sh-hf" placeholder="HR e.g. 82" style="padding:8px 10px;font-size:0.82rem;">
          <input class="f" id="sh-sat" placeholder="SpO2 e.g. 96%" style="padding:8px 10px;font-size:0.82rem;">
          <input class="f" id="sh-temp" placeholder="Temp e.g. 37.1°C" style="padding:8px 10px;font-size:0.82rem;">
        </div>
      </div>
      <div id="sh-glyc-wrap" style="display:none;margin-top:8px;"><input type="text" class="f" id="sh-glyc"></div>
    </div>
    <div class="blk">
      <span class="lbl" id="shift-act-lbl"></span>
      <div class="chips" id="sh-act-chips"></div>
      <div id="sh-med-wrap" style="display:none;margin-top:8px;"><input type="text" class="f" id="sh-med-detail"></div>
      <div id="sh-urine-wrap" style="display:none;margin-top:8px;"><input type="text" class="f" id="sh-urine-detail"></div>
    </div>
    <div class="blk">
      <span class="lbl" id="shift-fup-lbl"></span>

function cycleLang() {
  const langs = ['en','nl','fr'];
  lang = langs[(langs.indexOf(lang) + 1) % langs.length];
  document.getElementById('lang-display').textContent = lang.toUpperCase();
  renderAll();
  initSupportGreeting();
}

function closePopup() {
  localStorage.setItem('maya-seen','1');
  document.getElementById('popup').style.display = 'none';
}

function makeChips(containerId, items, key, exclusive) {
  const el = document.getElementById(containerId) || document.querySelector(`[data-key="${key}"]`);
  if (!el) return;
  if (!multiSel[key]) multiSel[key] = new Set();
  el.innerHTML = '';
  items.forEach(item => {
    const b = document.createElement('button');
    b.className = 'chip' + (multiSel[key].has(item) ? ' sel' : '');
    b.textContent = item;
    b.onclick = () => {
      if (exclusive) {
        el.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
        multiSel[key] = new Set([item]);
        b.classList.add('sel');
      } else {
        if (b.classList.contains('sel')) { b.classList.remove('sel'); multiSel[key].delete(item); }
        else { b.classList.add('sel'); multiSel[key].add(item); }
      }
      refreshBtns();
    };
    el.appendChild(b);
  });
}

function refreshBtns() {
  const hasCurrentPatient = !!getChips('sh-status');
  const hasAnyPatient = patients.length > 0 || hasCurrentPatient;
  const addBtn = document.getElementById('sh-add-btn');
  if (addBtn) addBtn.disabled = !hasCurrentPatient;
  document.getElementById('sh-btn').disabled = !hasAnyPatient;
  document.getElementById('comm-btn').disabled = !commType;
  document.getElementById('inc-btn').disabled = !incidentType;
  document.getElementById('wnd-btn').disabled = !getChips('wnd-type') || !getChips('wnd-loc');
  document.getElementById('beh-btn').disabled = !getChips('beh-type') || !getChips('beh-ctx');
  document.getElementById('med-btn').disabled = !getChips('med-change') || !(document.getElementById('med-name')?.value.trim());
}

function savePatients() {
  try { localStorage.setItem('maya-patients', JSON.stringify(patients)); } catch(e) {}
}

function loadSavedPatients() {
  try {
    const saved = localStorage.getItem('maya-patients');
    if (saved) {
      patients = JSON.parse(saved);
      if (patients.length > 0) {
        renderPatientList();
        document.getElementById('sh-patient-list').style.display = 'block';
      }
    }
  } catch(e) {}
}

function addPatient() {
  const data = getPatientData();
  if (!data.status) return;
  patients.push(data);
  savePatients();
  renderPatientList();
  clearPatientForm();
  document.getElementById('sh-patient-list').style.display = 'block';
  refreshBtns();
}

function removePatient(i) {
  patients.splice(i, 1);
  savePatients();
  renderPatientList();
  if (patients.length === 0) document.getElementById('sh-patient-list').style.display = 'none';
  refreshBtns();
}

// ─── API ───
async function callAPI(prompt, system, maxTokens) {
  const body = { messages:[{role:'user',content:prompt}], max_tokens: maxTokens||600 };
  if (system) body.system = system;
  const res = await fetch('/api/generate', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(JSON.stringify(data.error)||'API error');
  return data.content?.[0]?.text || '';
}

// ─── GENERATE ───
async function generate(mod) {
  const ids = {shift:'sh',comm:'comm',incident:'inc',wound:'wnd',behav:'beh',meds:'med'};
  const p = ids[mod];
  const loader = document.getElementById(p+'-loader');
  const err = document.getElementById(p+'-err');
  const btn = document.getElementById(p+'-btn');
  loader.classList.add('vis');
  err.classList.remove('vis');
  btn.disabled = true;
  try {
    const prompt = buildPrompt(mod);
    const result = await callAPI(prompt, null, mod === 'shift' && patients.length > 0 ? 1000 : 600);
    if (mod === 'shift') { patients = []; savePatients(); document.getElementById('sh-patient-list').style.display='none'; renderPatientList(); }
    showResult(mod, result);
  } catch(e) {
    const demo = DEMO_FALLBACK[lang] || DEMO_FALLBACK.en;
    showResult(mod, demo.prefix + (demo[mod] || demo.generic), true);
  } finally {
    loader.classList.remove('vis');
    refreshBtns();
  }
}

function showResult(mod, text, isDemo) {
  const titles = {shift:T[lang].shift.title, comm:T[lang].comm.title, incident:T[lang].incident.title, wound:T[lang].wound.title, behav:T[lang].behav.title, meds:T[lang].meds.title};
  document.getElementById('res-modal-title').textContent = titles[mod] || 'Report';
  document.getElementById('res-modal-text').value = text;
  document.getElementById('res-modal').style.display = 'flex';
  if (isDemo) return; // demo telt niet mee voor geschiedenis of tijd
  // Sla op in geschiedenis
  try {
    const hist = JSON.parse(localStorage.getItem('maya-history') || '[]');
    hist.unshift({ mod, title: titles[mod] || mod, text, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
    localStorage.setItem('maya-history', JSON.stringify(hist.slice(0, 5)));
    updateHistBtn();
  } catch(e) {}
  // Voeg tijd toe — gemiddeld 8 minuten bespaard per rapport
  addTimeSaved(8);
}

  document.getElementById('quiz-score').textContent = `${quizScore}/${quizTotal} (${Math.round(quizScore/quizTotal*100)}%)`;
  const expl = document.getElementById('quiz-expl');
  expl.textContent = '💡 ' + q.explanation;
  expl.style.display = 'block';
  document.getElementById('quiz-next-btn').style.display = 'block';

function setTaskFilter(f) {
  taskFilter = f;
  const colors = {all:'#fbbf24', urgent:'#f87171', done:'#34d399'};
  const ids = {all:'tf-all', urgent:'tf-urgent', done:'tf-done'};
  Object.entries(ids).forEach(([key, btnId]) => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    const isActive = key === f;
    btn.style.opacity = isActive ? '1' : '0.45';
    btn.style.fontWeight = isActive ? '700' : '500';
  });

}

function addTask() {
  const inp = document.getElementById('task-input');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  tasks.unshift({ id: Date.now(), text, done: false, urgent: false });
  saveTasks();
  inp.value = '';
  renderTaskList();
  const clearBtn = document.getElementById('task-clear-btn');
  if (clearBtn) clearBtn.style.display = 'block';
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); renderTaskList(); }
}

function toggleUrgent(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.urgent = !t.urgent; saveTasks(); renderTaskList(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTaskList();
}

function clearDoneTasks() {
  tasks = tasks.filter(t => !t.done);
  saveTasks();
  renderTaskList();
}

function renderTaskList() {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('task-empty');
  const clearBtn = document.getElementById('task-clear-btn');
  if (!list) return;
  list.innerHTML = '';

  let filtered = tasks;
  if (taskFilter === 'urgent') filtered = tasks.filter(t => t.urgent && !t.done);
  if (taskFilter === 'done') filtered = tasks.filter(t => t.done);

  const hasDone = tasks.some(t => t.done);
  if (clearBtn) clearBtn.style.display = hasDone ? 'block' : 'none';

  if (filtered.length === 0) {
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';

  // Urgente taken eerst
  const sorted = [...filtered].sort((a,b) => {
    if (a.urgent && !b.urgent) return -1;
    if (!a.urgent && b.urgent) return 1;
    return 0;
  });

  sorted.forEach(task => {
    const row = document.createElement('div');
    const borderColor = task.urgent && !task.done ? 'rgba(248,113,113,0.35)' : task.done ? 'rgba(52,211,153,0.2)' : 'rgba(251,191,36,0.2)';
    const bgColor = task.urgent && !task.done ? 'rgba(248,113,113,0.06)' : 'rgba(255,255,255,0.04)';
    row.style.cssText = 'display:flex;align-items:center;gap:10px;background:' + bgColor + ';border:1px solid ' + borderColor + ';border-radius:11px;padding:11px 13px;transition:all 0.2s;animation:fadeUp 0.2s ease;';

    // Check knop
    const check = document.createElement('button');
    const checkColor = task.done ? '#34d399' : task.urgent ? '#f87171' : '#fbbf24';
    check.style.cssText = 'width:24px;height:24px;border-radius:50%;border:2px solid ' + checkColor + ';background:' + (task.done ? checkColor : 'transparent') + ';cursor:pointer;flex-shrink:0;font-size:0.72rem;color:#fff;display:flex;align-items:center;justify-content:center;transition:all 0.2s;';
    check.textContent = task.done ? '✓' : '';
    check.onclick = () => toggleTask(task.id);

    // Tekst
    const textEl = document.createElement('span');
    textEl.style.cssText = 'flex:1;font-size:0.88rem;color:' + (task.done ? 'rgba(148,163,184,0.45)' : 'var(--text)') + ';text-decoration:' + (task.done ? 'line-through' : 'none') + ';line-height:1.45;';
    textEl.textContent = task.text;

    // Urgent knop
    if (!task.done) {
      const urgBtn = document.createElement('button');
      urgBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:0.85rem;opacity:' + (task.urgent ? '1' : '0.3') + ';padding:0 2px;';
      urgBtn.textContent = '🔴';
      urgBtn.title = (TASKS_T[lang]||TASKS_T.en).markUrgent;
      urgBtn.onclick = () => toggleUrgent(task.id);
      row.appendChild(check);
      row.appendChild(textEl);
      row.appendChild(urgBtn);
    } else {
      row.appendChild(check);
      row.appendChild(textEl);
    }

    // Verwijder
    const del = document.createElement('button');
    del.style.cssText = 'background:none;border:none;color:rgba(148,163,184,0.3);cursor:pointer;font-size:0.95rem;padding:0 2px;';
    del.textContent = '✕';
    del.onclick = () => deleteTask(task.id);
    row.appendChild(del);

    list.appendChild(row);
  });
}

  }

  makeRadio('sup-energy-list', b.energy, burnEnergy, v => { burnEnergy = v; });
  makeRadio('sup-feel-list', b.feel, burnFeel, v => { burnFeel = v; });
  makeRadio('sup-work-list', b.work, burnWork, v => { burnWork = v; });

  const btn = el('sup-burnout-btn');
  if (btn) btn.disabled = (burnEnergy === null || burnFeel === null || burnWork === null);
}

async function generateBurnoutAdvice() {
  const b = BURNOUT_T[lang] || BURNOUT_T.en;
  const energy = b.energy[burnEnergy] || '';
  const feel = b.feel[burnFeel] || '';
  const work = b.work[burnWork] || '';
  const loader = document.getElementById('sup-burnout-loader');
  const result = document.getElementById('sup-burnout-result');
  const btn = document.getElementById('sup-burnout-btn');
  if (loader) loader.style.display = 'flex';
  if (result) result.style.display = 'none';
  if (btn) btn.disabled = true;

  const prompt = lang === 'nl'
    ? `Je bent Maya, een warme AI-collega voor verpleegkundigen. Deze verpleegkundige heeft een burnout check-in gedaan:
- Energie: ${energy}
- Emotioneel: ${feel}  
- Werkdruk: ${work}

Schrijf een warm, persoonlijk antwoord van max 4 zinnen:
1. Erken hoe ze zich voelt — oprecht, geen toxic positivity
2. Geef 1 concrete, haalbare tip voor vandaag of vanavond
3. Eindig met een warme bemoediging

Geen bullet points. Spreek haar direct aan als "jij". Klink als een echte collega die begrijpt hoe zwaar zorgwerk is.`
    : lang === 'fr'
    ? `Vous êtes Maya. Bilan burnout: Énergie: ${energy}, Émotions: ${feel}, Charge: ${work}. Répondez chaleureusement en 4 phrases max. Reconnaissez les émotions, donnez 1 conseil pratique, terminez avec encouragement. Pas de listes. Parlez directement.`
    : `You are Maya, a warm AI companion for nurses. Burnout check-in: Energy: ${energy}, Emotional: ${feel}, Workload: ${work}. Write a warm personal response in max 4 sentences. Acknowledge how they feel (no toxic positivity), give 1 practical tip for today, end encouragingly. No bullet points. Speak directly as "you". Sound like a real colleague.`;

  try {
    const text = await callAPI(prompt, null, 350);
    if (result) { result.textContent = text; result.style.display = 'block'; }
  } catch(e) {
    if (result) { result.textContent = lang==='nl'?'Verbindingsfout. Probeer opnieuw.':'Connection error. Try again.'; result.style.display = 'block'; }
  }
  if (loader) loader.style.display = 'none';
  if (btn) btn.disabled = false;
}

// ─── QUIET SHIFT ───
async function generateQuietShift() {
  const btn = document.getElementById('sh-quiet-btn');
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = lang==='nl'?'Genereren...':lang==='fr'?'Génération...':'Generating...';

  const h = new Date().getHours();
  const shiftName = lang === 'nl'
    ? (h>=7&&h<15?'Dagdienst':h>=15&&h<22?'Avonddienst':'Nachtdienst')
    : lang === 'fr'
    ? (h>=7&&h<15?'La garde de jour':h>=15&&h<22?'La garde du soir':'La garde de nuit')
    : (h>=7&&h<15?'Day shift':h>=15&&h<22?'Evening shift':'Night shift');

  const prompt = lang === 'nl'
    ? `Schrijf één zin: "${shiftName} rustig verlopen, geen bijzonderheden." Schrijf alleen die zin.`
    : lang === 'fr'
    ? `Écrivez une seule phrase: "${shiftName} s'est déroulée calmement, rien à signaler." Écrivez uniquement cette phrase.`
    : `Write one sentence: "${shiftName} was uneventful, nothing to report." Write only that sentence.`;

  try {
    const result = await callAPI(prompt, null, 100);
    showResult('shift', result.trim());
  } catch(e) {
    // Fallback zonder API
    const fallback = lang==='nl'?`${shiftName} rustig verlopen, geen bijzonderheden.`
      :lang==='fr'?`${shiftName} s'est déroulée calmement, rien à signaler.`
      :`${shiftName} was uneventful, nothing to report.`;
    showResult('shift', fallback);
  }
  btn.disabled = false;
  btn.textContent = origText;
}

// ─── TIME SAVED ───
function loadTimeSaved() {
  try { timeSaved = parseInt(localStorage.getItem('maya-time-saved') || '0'); } catch(e) {}
  renderTimeSaved();
}

function addTimeSaved(minutes) {
  timeSaved += minutes;
  try { localStorage.setItem('maya-time-saved', String(timeSaved)); } catch(e) {}
  renderTimeSaved();
}

function renderTimeSaved() {
  const bar = document.getElementById('time-saved-bar');
  const lbl = document.getElementById('time-saved-label');
  const val = document.getElementById('time-saved-value');
  if (!bar || !lbl || !val) return;

  if (timeSaved === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  const hours = Math.floor(timeSaved / 60);
  const mins = timeSaved % 60;
  const timeStr = hours > 0
    ? (hours + (lang==='nl'?'u ':lang==='fr'?'h ':' h ') + (mins > 0 ? mins + (lang==='nl'?'min':'min') : ''))
    : mins + (lang==='nl'?' minuten':lang==='fr'?' minutes':' minutes');

  lbl.textContent = lang==='nl'?'Tijd bespaard met Maya':lang==='fr'?'Temps gagné avec Maya':'Time saved with Maya';
  val.textContent = '⏱️ ' + timeStr + (lang==='nl'?' teruggegeven aan je patiënten':lang==='fr'?' rendu à vos patients':' given back to your patients');
}

// ─── HISTORY ───
function openHistory() {
  try {
    const hist = JSON.parse(localStorage.getItem('maya-history') || '[]');
    const list = document.getElementById('hist-list');
    const titleEl = document.getElementById('hist-title');
    const closeBtn = document.getElementById('hist-close-btn');
    if (titleEl) titleEl.textContent = lang==='nl'?'Recente rapporten':lang==='fr'?'Rapports recents':'Recent reports';
    if (closeBtn) closeBtn.textContent = lang==='nl'?'Sluiten':lang==='fr'?'Fermer':'Close';
    if (!list) return;
    list.innerHTML = '';
    if (hist.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text2);font-size:0.85rem;text-align:center;padding:20px;';
      empty.textContent = lang==='nl'?'Nog geen rapporten':lang==='fr'?'Pas encore de rapports':'No reports yet';
      list.appendChild(empty);
    } else {
      hist.forEach(function(item, idx2) {
        const card = document.createElement('div');
        card.style.cssText = 'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:12px;margin-bottom:8px;';
        const header = document.createElement('div');
        header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;';
        const titleSpan = document.createElement('span');
        titleSpan.style.cssText = 'font-size:0.8rem;font-weight:600;color:var(--text3);';
        titleSpan.textContent = item.title || 'Report';
        const timeSpan = document.createElement('span');
        timeSpan.style.cssText = 'font-size:0.72rem;color:var(--text2);';
        timeSpan.textContent = item.time || '';
        header.appendChild(titleSpan);
        header.appendChild(timeSpan);
        const preview = document.createElement('div');
        preview.style.cssText = 'font-size:0.82rem;color:var(--text);line-height:1.6;max-height:80px;overflow:hidden;margin-bottom:8px;';
        preview.textContent = (item.text||'').substring(0,200) + ((item.text||'').length>200?'...':'');
        const openBtn = document.createElement('button');
        openBtn.style.cssText = 'padding:5px 12px;border-radius:8px;border:1px solid rgba(13,145,159,0.3);background:transparent;color:var(--text3);font-size:0.75rem;cursor:pointer;';
        openBtn.textContent = lang==='nl'?'Openen':lang==='fr'?'Ouvrir':'Open';
        openBtn.onclick = (function(n) { return function() { reuseReport(n); }; })(idx2);
        card.appendChild(header);
        card.appendChild(preview);
        card.appendChild(openBtn);
        list.appendChild(card);
      });
    }
    document.getElementById('hist-modal').style.display = 'flex';
  } catch(e) {}
}

function reuseReport(i) {
  try {
    const hist = JSON.parse(localStorage.getItem('maya-history') || '[]');
    const item = hist[i];
    if (item) {
      document.getElementById('hist-modal').style.display = 'none';
      document.getElementById('res-modal-title').textContent = item.title || 'Report';
      document.getElementById('res-modal-text').value = item.text || '';
      document.getElementById('res-modal').style.display = 'flex';
    }
  } catch(e) {}
}

function updateHistBtn() {
  try {
    const hist = JSON.parse(localStorage.getItem('maya-history') || '[]');
    const btn = document.getElementById('hist-btn');
    if (btn) btn.style.display = hist.length > 0 ? 'block' : 'none';
  } catch(e) {}
}

if ('serviceWorker' in navigator) {

// Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'flex';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {

      const banner = document.getElementById('install-banner');
      if (banner) banner.style.display = 'none';

// ─── VOICE ───
let voiceBtn = null;
let voiceTargetId = null;
let voiceSilenceTimer = null;

function stopVoice() {
  if (voiceRec) { try { voiceRec.stop(); } catch(e) {} voiceRec = null; }
  if (voiceBtn) { voiceBtn.classList.remove('rec'); voiceBtn.textContent = '🎤'; }
  if (voiceSilenceTimer) { clearTimeout(voiceSilenceTimer); voiceSilenceTimer = null; }
  voiceBtn = null; voiceTargetId = null;
}

function startVoice(btn, targetId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    const msg = lang==='nl'?'Stemherkenning niet ondersteund in deze browser.':lang==='fr'?'Reconnaissance vocale non supportée.':'Speech recognition not supported in this browser.';
    alert(msg); return;
  }
  voiceBtn = btn; voiceTargetId = targetId;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = lang === 'nl' ? 'nl-BE' : lang === 'fr' ? 'fr-FR' : 'en-US';
  let finalTranscript = '';
  let interimTranscript = '';

  r.onstart = () => {
    btn.classList.add('rec');
    btn.textContent = '⏹️';
    // Auto-stop na 30 seconden als fallback
    voiceSilenceTimer = setTimeout(() => stopVoice(), 30000);
  };

  r.onresult = e => {
    // Reset silence timer bij elk resultaat
    if (voiceSilenceTimer) clearTimeout(voiceSilenceTimer);
    interimTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript + ' ';
      } else {
        interimTranscript += e.results[i][0].transcript;
      }
    }
    const el = document.getElementById(targetId);
    if (el) {
      // Toon interim resultaat als placeholder feedback
      if (interimTranscript) {
        btn.style.opacity = '0.7';
      } else {
        btn.style.opacity = '1';
      }
    }
    // Auto-stop na 2.5 seconden stilte
    voiceSilenceTimer = setTimeout(() => {
      const el = document.getElementById(targetId);
      if (el && finalTranscript.trim()) {
        el.value = el.value ? el.value.trim() + ' ' + finalTranscript.trim() : finalTranscript.trim();
        refreshBtns();
        // Auto-resize textarea
        if (el.tagName === 'TEXTAREA') { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 150) + 'px'; }
      }
      stopVoice();
    }, 2500);
  };

  r.onerror = e => {
    if (e.error !== 'aborted') {
      const el = document.getElementById(targetId);
      if (el && finalTranscript.trim()) {
        el.value = el.value ? el.value.trim() + ' ' + finalTranscript.trim() : finalTranscript.trim();
        refreshBtns();
      }
    }
    stopVoice();
  };

  r.onend = () => {
    // Als er nog interim transcript is, voeg toe
    const el = document.getElementById(targetId);
    if (el && finalTranscript.trim() && !el.value.includes(finalTranscript.trim())) {
      el.value = el.value ? el.value.trim() + ' ' + finalTranscript.trim() : finalTranscript.trim();
      refreshBtns();
    }
    stopVoice();
  };

  voiceRec = r;
  try { r.start(); } catch(e) { stopVoice(); }
}

function toggleVoice(btn, targetId) {
  if (voiceRec) { stopVoice(); return; }
  startVoice(btn, targetId);
}
